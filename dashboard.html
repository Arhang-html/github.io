<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - 控制面板</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        .language-switch { position: absolute; top: 10px; right: 10px; }
        .back-btn { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
        h1 { color: #333; }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .option-btn {
            padding: 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .option-btn:hover { background: #218838; }
    </style>
</head>
<body>

<div class="language-switch">
    <select id="language-select" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="zh" selected>中文</option>
    </select>
</div>

<button class="back-btn" onclick="history.back()" data-en="← Back" data-zh="← 上一頁">← Back</button>

<h1 id="welcome-title" data-en="Dashboard" data-zh="控制面板">控制面板</h1>

<div class="options-grid">
    <button class="option-btn" onclick="goTo('calendar')" data-en="📅 Calendar" data-zh="📅 日曆">📅 日曆</button>
    <button class="option-btn" onclick="goTo('recipes')" data-en="📖 Recipes" data-zh="📖 食譜">📖 食譜</button>
    <button class="option-btn" onclick="goTo('supplier')" data-en="📦 Supplier List" data-zh="📦 供應商清單">📦 供應商清單</button>
    <button class="option-btn" onclick="goTo('labour')" data-en="👷 Labour Schedule" data-zh="👷 員工排班">👷 員工排班</button>
    <button class="option-btn" onclick="goTo('timer')" data-en="⏲️ Kitchen Timer" data-zh="⏲️ 廚房計時器">⏲️ 廚房計時器</button>
</div>

<script>
    const restaurant = localStorage.getItem('currentRestaurant');
    if (!restaurant) {
        alert('請先選擇餐廳！ / Please select restaurant first!');
        window.location.href = 'index.html';
    }

    const translations = {
        en: { 'Dashboard': 'Dashboard - ' + restaurant, 
              '← Back': '← Back',
              '📅 Calendar': '📅 Calendar (Coming Soon)',
              '📖 Recipes': '📖 Recipes',
              '📦 Supplier List': '📦 Supplier List (Coming Soon)',
              '👷 Labour Schedule': '👷 Labour Schedule (Coming Soon)',
              '⏲️ Kitchen Timer': '⏲️ Kitchen Timer (Coming Soon)'
            },
        zh: { 'Dashboard': '控制面板 - ' + restaurant,
              '← Back': '← 上一頁',
              '📅 Calendar': '📅 日曆（開發中）',
              '📖 Recipes': '📖 食譜',
              '📦 Supplier List': '📦 供應商清單（開發中）',
              '👷 Labour Schedule': '👷 員工排班（開發中）',
              '⏲️ Kitchen Timer': '⏲️ 廚房計時器（開發中）'
            }
    };

    function changeLanguage() {
        const lang = document.getElementById('language-select').value;
        document.querySelectorAll('[data-en]').forEach(el => {
            const key = el.getAttribute('data-en');
            el.textContent = translations[lang][key] || key;
        });
        document.getElementById('welcome-title').textContent = translations[lang]['Dashboard'];
    }

    function goTo(page) {
        if (page === 'recipes') {
            window.location.href = 'recipes.html';
        } else {
            alert('此功能開發中... / This feature is coming soon...');
        }
    }

    window.onload = () => {
        changeLanguage();
        document.getElementById('welcome-title').textContent = 
            (document.getElementById('language-select').value === 'zh' ? '控制面板 - ' : 'Dashboard - ') + restaurant;
    };
</script>

</body>
</html>
