<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Selection - 餐廳選擇</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f4f4f4; 
            text-align: center;
        }
        .language-switch { position: absolute; top: 10px; right: 10px; }
        h1 { color: #333; }
        .restaurant-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .restaurant-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 280px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .restaurant-card:hover {
            transform: scale(1.05);
        }
        .restaurant-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .restaurant-card h2 {
            margin: 15px 0 5px;
            color: #222;
        }
    </style>
</head>
<body>

<div class="language-switch">
    <select id="language-select" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="zh" selected>中文</option>
    </select>
</div>

<h1 data-en="Choose Your Restaurant" data-zh="選擇你的餐廳">選擇你的餐廳</h1>

<div class="restaurant-grid">
    <!-- Dan Ryan's -->
    <div class="restaurant-card" onclick="checkPassword('DanRyans')">
        <img src="DanRyansLogo.png" alt="Dan Ryan's">
        <h2 data-en="Dan Ryan's" data-zh="Dan Ryan's">Dan Ryan's</h2>
    </div>

    <!-- Niras -->
    <div class="restaurant-card" onclick="checkPassword('Niras')">
        <img src="NirasLogo.png" alt="Niras">
        <h2 data-en="Niras" data-zh="Niras">Niras</h2>
    </div>
</div>

<script>
    const translations = {
        en: {
            'Choose Your Restaurant': 'Choose Your Restaurant'
        },
        zh: {
            'Choose Your Restaurant': '選擇你的餐廳'
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('language-select').value;
        document.querySelectorAll('[data-en]').forEach(el => {
            const key = el.getAttribute('data-en');
            if (translations[lang][key]) el.textContent = translations[lang][key];
        });
    }

    function checkPassword(restaurant) {
        const input = prompt(restaurant === 'DanRyans' 
            ? '請輸入 Dan Ryan\'s 密碼 / Enter Dan Ryan\'s password:' 
            : '請輸入 Niras 密碼 / Enter Niras password:');
        
        const correctPW = restaurant === 'DanRyans' ? '2268' : 'ledu';
        
        if (input === correctPW) {
            localStorage.setItem('currentRestaurant', restaurant);
            window.location.href = 'dashboard.html';
        } else {
            alert('密碼錯誤！ / Wrong password!');
        }
    }

    window.onload = changeLanguage;
</script>

</body>
</html>
