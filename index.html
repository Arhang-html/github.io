<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Restaurant Access - 餐廳存取</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #00d4ff;
            --accent-hover: #00aaff;
            --card-bg: rgba(20, 20, 30, 0.6);
            --border: rgba(0, 212, 255, 0.15);
            --glow: 0 0 20px rgba(0, 212, 255, 0.3);
            --error: #ff4d4f;
            --input-bg: #111827;
            --input-border: #c9a96e;
            --input-glow: 0 0 15px rgba(201, 169, 110, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('IndexBackground.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.55) opacity(0.75);
            z-index: -1;
            pointer-events: none;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .language-switch {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        select, button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover, button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #8b0000;
            color: white;
        }

        .logout-btn:hover {
            background: #a00000;
        }

        .container {
            text-align: center;
            max-width: 600px;
            z-index: 1;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: var(--accent);
            text-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }

        .input-group {
            margin: 40px 0;
        }

        input[type="password"] {
            width: 100%;
            max-width: 400px;
            padding: 16px;
            font-size: 1.3rem;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            color: white;
            text-align: center;
            transition: all 0.3s;
            box-shadow: var(--input-glow);
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: var(--glow);
            outline: none;
        }

        .restaurant-display {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .restaurant-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: var(--glow);
            text-align: center;
        }

        .restaurant-card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 0 60px rgba(0,212,255,0.5);
        }

        .restaurant-card img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .restaurant-card h2 {
            font-size: 2rem;
            color: var(--accent);
        }


    </style>
</head>
<body>

<div class="top-bar">
    <div></div>

    <div class="language-switch">
        <select id="language-select" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="zh" selected>中文</option>
        </select>
        
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>
</div>

<div class="container">
    <h1 data-en="Enter Restaurant Code" data-zh="請輸入餐廳編號">請輸入餐廳編號</h1>

    <div class="input-group">
        <input type="password" id="restaurant-code" oninput="checkCode()">
    </div>

    <div class="restaurant-display" id="restaurant-display"></div>

</div>

<script>
// 登入檢查
if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
    window.location.href = 'login.html';
}

// 登出
function logout() {
    if (confirm('確定要登出嗎？')) {
        localStorage.removeItem('isAdminLoggedIn');
        localStorage.removeItem('loginTime');
        window.location.href = 'login.html';
    }
}

const translations = {
    en: {
        'Enter Restaurant Code': 'Enter Restaurant Code',
        'Invalid code, please try again': 'Invalid code, please try again'
    },
    zh: {
        'Enter Restaurant Code': '請輸入餐廳編號',
        'Invalid code, please try again': '編號錯誤，請再試一次'
    }
};

function changeLanguage() {
    const lang = document.getElementById('language-select').value;
    document.querySelectorAll('[data-en]').forEach(el => {
        const key = el.getAttribute('data-en');
        el.textContent = translations[lang][key] || key;
    });
}

function checkCode() {
    const code = document.getElementById('restaurant-code').value.trim().toLowerCase();
    const display = document.getElementById('restaurant-display');

    display.innerHTML = '';

    if (code === '2268') {
        display.innerHTML = `
            <div class="restaurant-card" onclick="enterRestaurant('DanRyans')">
                <img src="DanRyansLogo.png" alt="Dan Ryan's">
                <h2 data-en="Dan Ryan's" data-zh="芝加哥燒烤餐廳">芝加哥燒烤餐廳</h2>
            </div>
        `;
    } else if (code === 'ledu') {
        display.innerHTML = `
            <div class="restaurant-card">
                <img src="NirasLogo.png" alt="Niras">
                <h2 data-en="Niras" data-zh="Niras">Niras</h2>
                <p style="margin-top:20px; color:var(--text-secondary);">（功能開發中）</p>
            </div>
        `;
    }
}

function enterRestaurant(restaurant) {
    localStorage.setItem('currentRestaurant', restaurant);
    window.location.href = 'dashboarddanryans.html';
}

window.onload = changeLanguage;
</script>

</body>
</html>
