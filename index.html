<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Selection</title>
    <style>

	select {
    		color: #ffffff;           /* 按鈕文字保持白色 */
    		background: rgba(20, 20, 30, 0.8);
		}

	select option {
		    color: #ffffff;           /* 選項文字白色 */
		    background: #111827;      /* 深灰背景 */
		}

	select option:checked,
	select option:hover {
		    background: var(--accent); /* 藍綠高亮 */
		    color: #000000;
		}

        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #00d4ff;        /* SpaceX 藍綠科技色 */
            --accent-hover: #00aaff;
            --card-bg: rgba(20, 20, 30, 0.6);
            --border: rgba(0, 212, 255, 0.15);
            --glow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg) url('IndexBackground.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        .language-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        select, button {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        select:hover, button:hover {
            background: rgba(255,255,255,0.15);
            box-shadow: var(--glow);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.7) !important;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.9) !important;
        }

        .restaurant-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 120px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .restaurant-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 320px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: var(--glow);
        }

        .restaurant-card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 0 60px rgba(0,212,255,0.4);
        }

        .restaurant-card img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .restaurant-card h2 {
            font-size: 1.8rem;
            color: var(--accent);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="language-switch">
    <select id="language-select" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="zh" selected>中文</option>
    </select>
    
    <!-- 登出按鈕 -->
    <button class="logout-btn" onclick="logout()">登出</button>
</div>

<div class="restaurant-grid">
    <!-- Dan Ryan's -->
    <div class="restaurant-card" onclick="checkPassword('DanRyans')">
        <img src="DanRyansLogo.png" alt="Dan Ryan's">
        <h2 data-en="Dan Ryan's" data-zh="Dan Ryan's">Dan Ryan's</h2>
    </div>

    <!-- Niras -->
    <div class="restaurant-card" onclick="checkPassword('Niras')">
        <img src="NirasLogo.png" alt="Niras">
        <h2 data-en="Niras" data-zh="Niras">Niras</h2>
    </div>
</div>

<script>
// 登入檢查
if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
    window.location.href = 'login.html';
}

// 登出
function logout() {
    if (confirm('確定要登出嗎？')) {
        localStorage.removeItem('isAdminLoggedIn');
        localStorage.removeItem('loginTime'); // 如果有使用
        window.location.href = 'login.html';
    }
}

    const translations = {
        en: {
            'Dan Ryan\'s': 'Dan Ryan\'s',
            'Niras': 'Niras'
        },
        zh: {
            'Dan Ryan\'s': 'Dan Ryan\'s',
            'Niras': 'Niras'
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('language-select').value;
        document.querySelectorAll('[data-en]').forEach(el => {
            const key = el.getAttribute('data-en');
            el.textContent = translations[lang][key] || key;
        });
    }

    function checkPassword(restaurant) {
        const input = prompt(restaurant === 'DanRyans' 
            ? '請輸入 Dan Ryan\'s 密碼 / Enter Dan Ryan\'s password:' 
            : '請輸入 Niras 密碼 / Enter Niras password:');
        
        const correctPW = restaurant === 'DanRyans' ? '2268' : 'ledu';
        
        if (input === correctPW) {
            localStorage.setItem('currentRestaurant', restaurant);
            window.location.href = 'dashboard.html';
        } else {
            alert('密碼錯誤！ / Wrong password!');
        }
    }

    window.onload = changeLanguage;
</script>

</body>
</html>
